services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    container_name: mongoDB
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/schemaScript.js:/docker-entrypoint-initdb.d/schemaScript.js:ro
    networks:
      - overm-network

volumes:
  mongo-data:

networks:
  overm-network:
    external: true